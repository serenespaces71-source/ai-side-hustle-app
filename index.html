<!DOCTYPE html>
<html>
<head>
<title>AI Side Hustle Generator</title>

<style>
body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
padding:40px;
}

.container{
background:white;
color:black;
padding:30px;
border-radius:10px;
max-width:400px;
margin:auto;
}

input{
padding:10px;
width:80%;
margin:10px;
}

button{
padding:10px 20px;
background:#667eea;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#4c5bd4;
}

#idea{
margin-top:20px;
font-weight:bold;
}

.money{
margin-top:20px;
}
</style>
</head>

<body>

<h1>AI Side Hustle Generator</h1>
<p>Type a skill and get a business idea instantly.</p>

<div class="container">

<input id="skill" placeholder="Example: fitness, cooking, writing">

<br>

<button onclick="generateIdea()">Generate Idea</button>

<p id="idea"></p>

<div class="money">
<p>Want 100 side hustle ideas?</p>

<a href="https://beacons.ai/zandisile_marketing" target="_blank">
<button>Get More Ideas</button>
</a>

</div>

</div>

<script>

const ideas = [
"Start a YouTube channel teaching SKILL",
"Sell a digital guide about SKILL",
"Offer freelance services for SKILL",
"Start an Instagram page about SKILL",
"Create an online course about SKILL",
"Start a coaching business for SKILL",
"Write an ebook about SKILL",
"Create templates related to SKILL",
"Start a blog about SKILL",
"Sell printable planners about SKILL",
"Offer consulting services in SKILL",
"Start a podcast discussing SKILL",
"Sell beginner tutorials about SKILL",
"Create social media content teaching SKILL"
];

function generateIdea(){

let skill = document.getElementById("skill").value;

if(skill===""){
document.getElementById("idea").innerHTML="Please enter a skill.";
return;
}

let randomIdea = ideas[Math.floor(Math.random()*ideas.length)];

document.getElementById("idea").innerHTML = randomIdea.replace("SKILL",skill);

}

</script>

</body>
  </html>
