<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Multi Tool Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#667eea,#764ba2);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px;
      min-height: 100vh;
      margin: 0;
      color: white;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    select, input, button {
      padding: 10px 15px;
      margin: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: none;
    }
    button {
      background-color: #4a148c;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background-color: #6a1b9a;
    }
    #idea {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      color: white;
    }
    .container {
      background: white;
      color: black;
      padding: 30px;
      border-radius: 10px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .container button {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>AI Multi Tool Generator</h1>
  <div class="container">
    <select id="toolType">
      <option value="Side Hustle">Side Hustle Generator</option>
      <option value="Business Idea">Business Idea Generator</option>
      <option value="Passive Income">Passive Income Generator</option>
    </select>
    <br>
    <input type="text" id="skill" placeholder="Enter a skill or niche">
    <br>
    <button onclick="generateIdea()">Generate Idea</button>
    <button onclick="shareTool()">Share this tool</button>
    <div id="idea"></div>
  </div>

  <script>
    // Share button copies Beacons link
    function shareTool() {
      navigator.clipboard.writeText("https://beacons.ai/zandisile_marketing");
      alert("Beacons link copied! Share it with friends to see more ideas.");
    }

    const ideas = {
      "Side Hustle": [
        "Start a YouTube channel teaching SKILL",
        "Sell a digital guide about SKILL",
        "Offer freelance services for SKILL",
        "Create social media content teaching SKILL",
        "Start a blog about SKILL"
      ],
      "Business Idea": [
        "Launch a subscription box in the SKILL niche",
        "Start an online course teaching SKILL",
        "Offer consulting services in SKILL industry",
        "Write an ebook about SKILL",
        "Create templates related to SKILL for businesses"
      ],
      "Passive Income": [
        "Sell digital products related to SKILL",
        "Create printables for SKILL",
        "Build an email course teaching SKILL",
        "Start a podcast discussing SKILL",
        "Sell beginner tutorials about SKILL"
      ]
    };

    function generateIdea() {
      let skill = document.getElementById("skill").value.trim();
      let tool = document.getElementById("toolType").value;

      if(skill === "") {
        document.getElementById("idea").innerHTML = "Please enter a skill or niche.";
        return;
      }

      let toolIdeas = ideas[tool];
      let randomIdea = toolIdeas[Math.floor(Math.random() * toolIdeas.length)];
      document.getElementById("idea").innerHTML = randomIdea.replace(/SKILL/g, skill);
    }
  </script>
</body>
</html>
