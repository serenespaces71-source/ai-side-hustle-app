<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Side Hustle Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px;
      min-height: 100vh;
      margin: 0;
    }
    h1 {
      color: #4a148c;
      text-align: center;
    }
    input, button {
      padding: 10px 15px;
      margin: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background-color: #4a148c;
      color: white;
      cursor: pointer;
      border: none;
    }
    button:hover {
      background-color: #6a1b9a;
    }
    #idea {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>AI Side Hustle Generator</h1>
  <input type="text" id="skill" placeholder="Enter a skill or hobby">
  <button onclick="generateIdea()">Generate Idea</button>
  <button onclick="shareTool()">Share this tool</button>
  <div id="idea"></div>

  <script>
    function shareTool() {
  navigator.clipboard.writeText("https://beacons.ai/zandisile_marketing");
  alert("Beacons link copied! Share it with friends to see more ideas.");
    }

    const ideas = [
      "Start a blog about SKILL",
      "Sell printable planners about SKILL",
      "Offer consulting services in SKILL",
      "Start a podcast discussing SKILL",
      "Sell beginner tutorials about SKILL",
      "Create social media content teaching SKILL"
    ];

    function generateIdea() {
      let skill = document.getElementById("skill").value;

      if (skill === "") {
        document.getElementById("idea").innerHTML = "Please enter a skill.";
        return;
      }

      let randomIdea = ideas[Math.floor(Math.random() * ideas.length)];
      document.getElementById("idea").innerHTML = randomIdea.replace("SKILL", skill);
    }
  </script>
</body>
</html>
